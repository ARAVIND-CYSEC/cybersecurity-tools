<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CyberShield - CVE Tools</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<script> tailwind.config = { darkMode: 'class' }; </script>

<style>
  body { transition: 0.5s; }

  /* Navbar Buttons */
  .nav-btn {
    padding: 0.35rem 0.9rem;
    font-size: 0.875rem;
    font-weight: 500;
    border-radius: 6px;
    color: #1f2937;
    background: transparent;
    transition: all 0.3s ease;
  }
  .nav-btn:hover {
    background-color: rgba(59, 130, 246, 0.1);
    transform: translateY(-1px);
  }
  .dark .nav-btn { color: #ffffff; }
  .dark .nav-btn:hover { background-color: rgba(99, 102, 241, 0.15); }

  /* Tool Button Active */
  .tool-btn.active { background-color: #4f46e5; color: white; }

  /* Card Hover */
  .card { transition: transform 0.2s; }
  .card:hover { transform: translateY(-4px); }
</style>
  <link rel="stylesheet" href="responsive.css">
</head>

<body class="min-h-screen flex flex-col bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-500">

<!-- Navbar -->
<nav class="fixed top-0 left-0 right-0 backdrop-blur-md bg-white/90 dark:bg-gray-900/90 shadow-md z-50 flex justify-between items-center px-6 py-3 border-b border-gray-200 dark:border-gray-700">
  <a href="home2.html" class="font-bold text-lg text-gray-900 dark:text-gray-100 relative inline-flex items-center gap-2">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 text-indigo-600 dark:text-indigo-400" aria-hidden="true">
      <path d="M12 2l7 3v6c0 5.25-3.44 9.92-7 11-3.56-1.08-7-5.75-7-11V5l7-3zm0 4.2L8 7.86v3.02c0 3.73 2.24 7.04 4 7.88 1.76-.84 4-4.15 4-7.88V7.86l-4-1.66zm-.75 2.3h1.5v2.75h2.75v1.5h-2.75v2.75h-1.5v-2.75H8.5v-1.5h2.75V8.5z"/>
    </svg>
    <span>CyberShield</span>
    <span class="absolute -top-1 -right-3 w-6 h-6 bg-indigo-500 opacity-20 rounded-full blur-xl animate-pulse dark:bg-indigo-400"></span>
  </a>

  <div class="flex items-center gap-3">
    <button onclick="window.location.href='home2.html'" class="nav-btn">Home</button>
    <button onclick="window.location.href='toolhash.html'" class="nav-btn">Sec Tools</button>
    <button onclick="window.location.href='tool2.html'" class="nav-btn">Threats</button>
    <button onclick="window.location.href='tool3.html'" class="nav-btn">WHOIS</button>
    <button onclick="window.location.href='reports.html'" class="nav-btn">Reports</button>
    
    <!-- Theme Toggle -->
    <button id="themeToggle" class="p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-700 transition">
      <svg id="iconMoon" xmlns="http://www.w3.org/2000/svg" fill="none"
        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
        class="w-5 h-5 block dark:hidden">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
      </svg>
      <svg id="iconSun" xmlns="http://www.w3.org/2000/svg" fill="none"
        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
        class="w-5 h-5 hidden dark:block">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 3v1m0 16v1m8.66-9h-1M4.34 12h-1m15.364
           5.364l-.707-.707M6.343 6.343l-.707-.707m12.728
           12.728l-.707-.707M6.343 17.657l-.707-.707M12
           7a5 5 0 100 10 5 5 0 000-10z" />
      </svg>
    </button>
  </div>
</nav>

<!-- Main Content -->
<main class="flex-grow flex flex-col items-center px-4 py-28 max-w-7xl mx-auto">
  <h1 class="text-6xl sm:text-7xl font-extrabold mb-8 text-center text-indigo-600 dark:text-indigo-400 w-full max-w-4xl">
    CVE Vulnerability Scanner
  </h1>
  <p class="max-w-4xl mb-10 text-center text-gray-700 dark:text-gray-300 text-lg">
    Search for software vulnerabilities using NVD's database. Select severity filters to refine results.
  </p>

  <!-- CVE Input -->
  <div class="flex flex-col md:flex-row gap-4 mb-6 items-center w-full max-w-3xl">
    <input id="softwareInput" type="text" placeholder="Enter software name" class="w-full md:w-2/3 p-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100" />
    <div class="w-full md:w-auto flex items-center gap-3">
      <select id="severityFilter" class="w-full md:w-40 p-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100">
        <option value="">All Severities</option>
        <option value="LOW">Low</option>
        <option value="MEDIUM">Medium</option>
        <option value="HIGH">High</option>
        <option value="CRITICAL">Critical</option>
      </select>
      <span id="activeSeverityBadge" class="inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold bg-gray-200 text-gray-700 dark:bg-gray-700 dark:text-gray-100 whitespace-nowrap">
        Active: All
      </span>
    </div>
    <div class="flex gap-2 w-full md:w-auto">
      <button onclick="searchVulnerabilities()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg w-full md:w-auto transition">Search</button>
      <button onclick="exportCveReport()" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg w-full md:w-auto transition">Export</button>
    </div>
  </div>

  <!-- Results -->
  <div id="results" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 w-full max-w-4xl"></div>
</main>

<script>
  // Theme Toggle
  const themeToggle = document.getElementById("themeToggle");
  const iconMoon = document.getElementById("iconMoon");
  const iconSun = document.getElementById("iconSun");

  function applyTheme(isDark) {
    document.documentElement.classList.toggle("dark", isDark);
    iconMoon.classList.toggle("hidden", isDark);
    iconSun.classList.toggle("hidden", !isDark);
    localStorage.theme = isDark ? "dark" : "light";
  }
  function initTheme() {
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const storedTheme = localStorage.theme;
    applyTheme(storedTheme === "dark" || (!storedTheme && prefersDark));
  }
  themeToggle.addEventListener("click", () => {
    applyTheme(!document.documentElement.classList.contains("dark"));
  });
  initTheme();

  const severityFilter = document.getElementById("severityFilter");
  const activeSeverityBadge = document.getElementById("activeSeverityBadge");
  let cveReportState = null;

  function updateSeverityBadge(){
    const severity = severityFilter.value.trim().toUpperCase();
    const label = severity || "ALL";
    activeSeverityBadge.textContent = `Active: ${label === "ALL" ? "All" : label}`;

    activeSeverityBadge.className = "inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold whitespace-nowrap";
    switch(label){
      case "LOW":
        activeSeverityBadge.classList.add("bg-green-100","text-green-700","dark:bg-green-900","dark:text-green-200");
        break;
      case "MEDIUM":
        activeSeverityBadge.classList.add("bg-yellow-100","text-yellow-700","dark:bg-yellow-900","dark:text-yellow-200");
        break;
      case "HIGH":
        activeSeverityBadge.classList.add("bg-orange-100","text-orange-700","dark:bg-orange-900","dark:text-orange-200");
        break;
      case "CRITICAL":
        activeSeverityBadge.classList.add("bg-red-100","text-red-700","dark:bg-red-900","dark:text-red-200");
        break;
      default:
        activeSeverityBadge.classList.add("bg-gray-200","text-gray-700","dark:bg-gray-700","dark:text-gray-100");
        break;
    }
  }

  severityFilter.addEventListener("change", updateSeverityBadge);
  updateSeverityBadge();

  function saveLocalCveReport(report){
    const key = "cybershieldSavedReports";
    const reports = JSON.parse(localStorage.getItem(key) || "[]");
    reports.unshift({
      id: `cve-${Date.now()}`,
      savedAt: new Date().toISOString(),
      ...report
    });
    localStorage.setItem(key, JSON.stringify(reports.slice(0, 50)));
  }

  function exportCveReport(){
    if(!cveReportState){
      alert("Run a CVE search first so there is report data to export.");
      return;
    }
    const blob = new Blob([JSON.stringify(cveReportState, null, 2)], { type: "application/json;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = "cybershield-cve-report.json";
    document.body.appendChild(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(url);
  }

  // CVE Search
  async function searchVulnerabilities(){
    const input = document.getElementById("softwareInput").value.trim();
    const severity = severityFilter.value.trim().toUpperCase();
    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = '';
    if(!input){ resultsDiv.innerHTML = '<p class="col-span-full text-center text-red-600">Enter software name.</p>'; return; }

    resultsDiv.innerHTML = '<p class="col-span-full text-center">Searching CVEs...</p>';

    try {
      const response = await fetch(`/api/cves?keyword=${encodeURIComponent(input)}&severity=${encodeURIComponent(severity)}`);
      if(!response.ok){
        const errorData = await response.json();
        throw new Error(errorData.error || 'Unable to fetch CVEs');
      }
      const data = await response.json();
      const filtered = (data.items || []).filter(item => {
        if(!severity) return true;
        return (item.severity || '').toUpperCase() === severity;
      });
      cveReportState = {
        tool: "cve",
        query: input,
        severity: severity || "ALL",
        fetchedAt: data.fetchedAt || new Date().toISOString(),
        report: filtered
      };
      saveLocalCveReport(cveReportState);

      if(filtered.length === 0){ resultsDiv.innerHTML = '<p class="col-span-full text-center">No vulnerabilities found.</p>'; return; }

      resultsDiv.innerHTML = `
        <div class="col-span-full text-sm text-gray-600 dark:text-gray-300 mb-2">
          Showing ${filtered.length} real-time CVE result(s) for <strong>${input}</strong>${severity ? ` with <strong>${severity}</strong> severity` : ' across <strong>all severities</strong>'}, sorted by <strong>newest first</strong>.
        </div>
      `;
      filtered.forEach(item => {
        const id = item.id;
        const desc = item.description || 'No description';
        const severityLabel = item.severity || 'N/A';
        const color = severityColor(severityLabel);

        const card = document.createElement('div');
        card.className = `card p-4 bg-white dark:bg-gray-800 rounded-lg shadow-md flex flex-col justify-between`;
        card.innerHTML = `
          <p class="font-bold text-indigo-500 dark:text-indigo-400">${id}</p>
          <p class="text-gray-700 dark:text-gray-200 text-sm mt-1">${desc}</p>
          <p class="mt-2 font-semibold ${color}">Severity: ${severityLabel}</p>
          <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">Published: ${item.published ? new Date(item.published).toLocaleString() : 'N/A'}</p>
          <a href="${item.url}" target="_blank" class="text-blue-600 hover:underline mt-2 text-sm">View on NVD</a>
        `;
        resultsDiv.appendChild(card);
      });

    } catch(e){
      resultsDiv.innerHTML = `<p class="col-span-full text-center text-red-600">Error fetching CVEs: ${e.message}</p>`;
    }
  }

  function severityColor(sev){
    switch(sev.toUpperCase()){
      case 'LOW': return 'text-green-600';
      case 'MEDIUM': return 'text-yellow-500';
      case 'HIGH': return 'text-orange-600';
      case 'CRITICAL': return 'text-red-600';
      default: return 'text-gray-500';
    }
  }
</script>
<script src="ai-assistant.js"></script>

  <script src="responsive-nav.js"></script>
</body>
</html>
