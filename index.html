<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music Player</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white p-6">

<h1 class="text-3xl font-bold mb-4">🎵 Music Player</h1>

<!-- Search -->

<div class="flex gap-2 mb-6">
    <input id="searchInput" class="p-2 w-full text-black" placeholder="Search any song or artist...">
    <button onclick="searchSong()" class="bg-green-500 px-4 py-2">Search</button>
</div>

<!-- Results -->

<div id="results" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

<!-- Player -->

<div class="mt-6">
    <iframe id="player" width="100%" height="300" allowfullscreen></iframe>
</div>

<script>
const YOUTUBE_API = "AIzaSyArhZ5Z_h8NGU-alXXxjtJ9il606Ws1woY"; // 🔥 paste your key here

async function searchSong() {
    const query = document.getElementById("searchInput").value;

    // 🔥 improved search (works for all artists)
    const refinedQuery = query + " official audio song";

    const res = await fetch(
        `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(refinedQuery)}&type=video&videoEmbeddable=true&videoCategoryId=10&maxResults=8&key=${YOUTUBE_API}`
    );

    const data = await res.json();
    displayResults(data.items);
}

function displayResults(videos) {
    const results = document.getElementById("results");
    results.innerHTML = "";

    videos.forEach(video => {
        const title = video.snippet.title.toLowerCase();

        // 🔥 filter bad results
        if (
            title.includes("mix") ||
            title.includes("playlist") ||
            title.includes("top") ||
            title.includes("jukebox") ||
            title.includes("lofi") ||
            title.includes("live")
        ) return;

        const videoId = video.id.videoId;
        const thumbnail = video.snippet.thumbnails.medium.url;

        const card = `
            <div class="cursor-pointer hover:scale-105 transition" onclick="playVideo('${videoId}')">
                <img src="${thumbnail}" class="rounded-lg">
                <p class="text-sm mt-2">${video.snippet.title}</p>
            </div>
        `;

        results.innerHTML += card;
    });
}

function playVideo(videoId) {
    document.getElementById("player").src = `https://www.youtube.com/embed/${videoId}`;
}
</script>

</body>
</html>
