<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OSINT Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
  </script>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-black dark:text-white">

  <!-- Fixed Navbar -->
  <nav
    id="navbar"
    class="fixed top-0 left-0 right-0 backdrop-blur-md bg-white/80 dark:bg-gray-900/80 shadow-lg z-50 flex justify-between items-center px-6 py-3 border-b border-gray-200 dark:border-gray-700"
  >
    <!-- Left Side Navigation -->
    <div class="flex gap-3 items-center">
      <button onclick="window.location.href='home.html'" class="nav-btn">Home</button>
      <button onclick="window.location.href='threats.html'" class="nav-btn">Sec Tools</button>
      <div class="relative group">
        <button class="nav-btn">Tools ▾</button>
        <div
          class="absolute hidden group-hover:block mt-2 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 overflow-hidden animate-fadeIn"
        >
          <a href="threats2.html" class="dropdown-item">Vulnerability Scanner</a>
          <a href="vulnerablity.html" class="dropdown-item">IP Lookup</a>
          <a href="vulnerablity.html" class="dropdown-item">Base64 Converter</a>
        </div>
      </div>
      <button onclick="window.location.href='osint.html'" class="nav-btn">OSINT</button>
      <button onclick="window.location.href='one.html'" class="nav-btn">WHOIS</button>
      <button onclick="window.location.href='passtools.html'" class="nav-btn">SafeNet</button>
    </div>

    <!-- Right Side: Branding + Theme Toggle -->
    <div class="flex items-center gap-3">
      <span class="font-bold text-lg text-gray-900 dark:text-gray-100 relative">
        CyberShield
        <span
          class="absolute -top-2 -right-4 w-8 h-8 bg-indigo-500 opacity-20 rounded-full blur-xl animate-pulse dark:bg-indigo-400"
        ></span>
      </span>
      <button id="themeToggle" class="p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-700 transition">
        <svg id="iconMoon" xmlns="http://www.w3.org/2000/svg" fill="none"
          viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
          class="w-5 h-5 block dark:hidden">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
        </svg>
        <svg id="iconSun" xmlns="http://www.w3.org/2000/svg" fill="none"
          viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
          class="w-5 h-5 hidden dark:block">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 3v1m0 16v1m8.66-9h-1M4.34 12h-1m15.364
             5.364l-.707-.707M6.343 6.343l-.707-.707m12.728
             12.728l-.707-.707M6.343 17.657l-.707-.707M12
             7a5 5 0 100 10 5 5 0 000-10z" />
        </svg>
      </button>
    </div>
  </nav>

  <!-- Page Header -->
  <header class="text-center mt-20 mb-12 px-4">
    <h1 class="text-4xl sm:text-5xl font-extrabold text-indigo-600 dark:text-indigo-400">
      OSINT Dashboard
    </h1>
    <p class="text-gray-700 dark:text-gray-300 mt-4 max-w-2xl mx-auto">
      Perform WHOIS lookup, DNS records, RDAP queries, and check website uptime for comprehensive open-source intelligence analysis.
    </p>
  </header>

<style>
  .nav-btn {
    padding: 0.35rem 0.9rem;
    font-size: 0.875rem;
    font-weight: 500;
    border-radius: 6px;
    color: var(--tw-text-gray-800);
    background: transparent;
    transition: all 0.3s ease;
  }
  .nav-btn:hover {
    background-color: rgba(59, 130, 246, 0.1);
    transform: translateY(-1px);
  }
  .dark .nav-btn:hover {
    background-color: rgba(99, 102, 241, 0.15);
  }
  .dropdown-item {
    display: block;
    padding: 0.5rem 1rem;
    font-size: 0.875rem;
    color: #374151;
    transition: background 0.3s ease;
  }
  .dropdown-item:hover {
    background-color: rgba(59, 130, 246, 0.1);
  }
  .dark .dropdown-item {
    color: #d1d5db;
  }
  .dark .dropdown-item:hover {
    background-color: rgba(99, 102, 241, 0.15);
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-fadeIn {
    animation: fadeIn 0.25s ease-out;
  }
</style>

<script>
  // ===== Dropdown Handling =====
  document.addEventListener("click", (e) => {
    const dropdowns = document.querySelectorAll('[id$="Dropdown"]');
    if (e.target.closest(".relative")) return;
    dropdowns.forEach((d) => d.classList.add("hidden"));
  });

  function toggleDropdown(id) {
    const menu = document.getElementById(id);
    const isOpen = !menu.classList.contains("hidden");
    document.querySelectorAll('[id$="Dropdown"]').forEach((d) => d.classList.add("hidden"));
    if (!isOpen) menu.classList.remove("hidden");
  }

  // ===== Navigation Button Click Animation =====
  const navButtons = document.querySelectorAll(".nav-btn");
  navButtons.forEach((btn) => {
    btn.addEventListener("click", (e) => {
      navButtons.forEach((b) => b.classList.remove("clicked"));
      e.currentTarget.classList.add("clicked");
    });
  });

  // ===== Dark/Light Theme Toggle =====
  const themeToggle = document.getElementById("themeToggle");
  const iconMoon = document.getElementById("iconMoon");
  const iconSun = document.getElementById("iconSun");

  function applyTheme(isDark) {
    document.documentElement.classList.toggle("dark", isDark);
    iconMoon.classList.toggle("hidden", isDark);
    iconSun.classList.toggle("hidden", !isDark);
    localStorage.theme = isDark ? "dark" : "light";
  }

  function initTheme() {
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const storedTheme = localStorage.theme;
    applyTheme(storedTheme === "dark" || (!storedTheme && prefersDark));
  }

  themeToggle.addEventListener("click", () => {
    applyTheme(!document.documentElement.classList.contains("dark"));
  });

  initTheme();
</script>

<!-- WHOIS + OSINT Tools Card -->
<section class="max-w-4xl mx-auto">
  <div class="bg-gray-100 dark:bg-gray-800 rounded-xl shadow-lg p-6 flex flex-col">
    <h2 class="text-2xl font-bold text-indigo-400 mb-4 text-center">WHOIS & OSINT Tools</h2>
    <input id="domainInput" type="text" placeholder="Enter domain (e.g. example.com)" 
      class="mb-4 px-4 py-2 rounded-md border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-black dark:text-white" />
    <div class="flex flex-wrap justify-center gap-2 mb-4">
      <button onclick="fetchWhois()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded">WHOIS</button>
      <button onclick="fetchDNS()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded">DNS Records</button>
      <button onclick="fetchRDAP()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded">RDAP</button>
      <button onclick="checkUptime()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded">Uptime</button>
      <button onclick="toggleVisibility()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded">Hide Data</button>
      <button onclick="refreshData()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded">Refresh</button>
    </div>
    <pre id="resultBox" class="bg-gray-200 dark:bg-gray-900 p-4 rounded-md overflow-x-auto text-sm max-h-48 mb-4">
WHOIS data will appear here...
    </pre>
    <div id="dnsTableContainer" class="overflow-auto max-h-48 hidden">
      <table class="w-full border-collapse border border-gray-300 dark:border-gray-600" id="dnsTable">
        <thead>
          <tr class="bg-indigo-100 dark:bg-indigo-900">
            <th class="border border-gray-300 px-3 py-1">Name</th>
            <th class="border border-gray-300 px-3 py-1">TTL</th>
            <th class="border border-gray-300 px-3 py-1">Type</th>
            <th class="border border-gray-300 px-3 py-1">Data</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <pre id="rawDNS" class="bg-gray-200 dark:bg-gray-900 p-2 rounded-md text-xs overflow-x-auto mt-2 max-h-32 hidden"></pre>
    <div id="uptimeStatus" class="mt-2 text-center font-semibold"></div>
  </div>
</section>

<script>
const WHOIS_API_KEY = 'AbyE6S9z+pg9EjVnzjfSAg==pjvcXOheWxGC0f0P';

function getDomain() { return document.getElementById('domainInput').value.trim(); }

async function fetchWhois() {
  const domain = getDomain();
  const resultBox = document.getElementById('resultBox');
  hideDNSOutputs(); clearUptimeStatus();
  if (!domain) return resultBox.textContent = "❌ Enter a domain.";
  resultBox.textContent = "⏳ Fetching WHOIS info...";
  try {
    const res = await fetch(`https://api.api-ninjas.com/v1/whois?domain=${domain}`, {
      headers: { 'X-Api-Key': WHOIS_API_KEY }
    });
    const data = await res.json();
    resultBox.textContent = data.domain_name ? JSON.stringify(data, null, 2) : "❌ No WHOIS data found.";
  } catch {
    resultBox.textContent = "❌ Error fetching WHOIS.";
  }
}

async function fetchDNS() {
  const domain = getDomain();
  const resultBox = document.getElementById('resultBox');
  const dnsTableContainer = document.getElementById('dnsTableContainer');
  const dnsTableBody = document.querySelector('#dnsTable tbody');
  const rawDNS = document.getElementById('rawDNS');
  clearUptimeStatus();
  if (!domain) return resultBox.textContent = "❌ Enter a domain.";
  resultBox.textContent = "⏳ Fetching DNS info...";
  dnsTableContainer.classList.add('hidden');
  rawDNS.classList.add('hidden');
  dnsTableBody.innerHTML = '';
  try {
    const url = `https://api.allorigins.win/get?url=${encodeURIComponent("https://api.hackertarget.com/dnslookup/?q=" + domain)}`;
    const res = await fetch(url);
    const data = await res.json();
    if(!data.contents){ resultBox.textContent="❌ No DNS records found."; return; }
    rawDNS.textContent = data.contents; rawDNS.classList.remove('hidden');
    const lines = data.contents.split('\n').filter(line => line.trim() && !line.startsWith(';'));
    const records = lines.map(line=>{
      const parts=line.trim().split(/\s+/);
      if(parts.length>=5) return { name: parts[0], ttl: parts[1], type: parts[3], data: parts.slice(4).join(' ') };
      return null;
    }).filter(r=>r!==null);
    if(records.length===0){ resultBox.textContent="❌ No valid DNS records found."; return; }
    records.forEach(r=>{
      const tr = document.createElement('tr');
      tr.className="even:bg-gray-100 dark:even:bg-gray-900";
      tr.innerHTML = `<td class="border border-gray-300 px-3 py-1">${r.name}</td>
                      <td class="border border-gray-300 px-3 py-1">${r.ttl}</td>
                      <td class="border border-gray-300 px-3 py-1">${r.type}</td>
                      <td class="border border-gray-300 px-3 py-1">${r.data}</td>`;
      dnsTableBody.appendChild(tr);
    });
    dnsTableContainer.classList.remove('hidden');
    resultBox.textContent = "";
  } catch(err){
    console.error(err);
    resultBox.textContent="❌ Error fetching DNS data.";
    rawDNS.classList.add('hidden'); dnsTableContainer.classList.add('hidden');
  }
}

async function fetchRDAP() {
  const domain = getDomain();
  const resultBox = document.getElementById('resultBox');
  hideDNSOutputs(); clearUptimeStatus();
  if (!domain) return resultBox.textContent = "❌ Enter a domain.";
  resultBox.textContent = "⏳ Fetching RDAP info...";
  try {
    const response = await fetch(`https://rdap.org/domain/${domain}`);
    if (!response.ok) throw new Error("Failed to fetch RDAP");
    const data = await response.json();
    resultBox.textContent = JSON.stringify(data, null, 2);
  } catch {
    resultBox.textContent = "❌ RDAP error or unsupported domain.";
  }
}

async function checkUptime() {
  const domain = getDomain();
  const uptimeStatus = document.getElementById('uptimeStatus');
  const resultBox = document.getElementById('resultBox');
  hideDNSOutputs();
  if (!domain) { resultBox.textContent="❌ Enter a domain."; uptimeStatus.textContent=""; return; }
  uptimeStatus.textContent="⏳ Checking uptime...";
  try {
    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(),7000);
    await fetch(`https://${domain}`,{signal:controller.signal,mode:'no-cors'});
    clearTimeout(timeout);
    uptimeStatus.textContent=`✅ ${domain} is ONLINE`; resultBox.textContent="";
  } catch { uptimeStatus.textContent=`❌ ${domain} is OFFLINE or unreachable`; }
}

function toggleVisibility(){
  const elements = [document.getElementById('resultBox'), document.getElementById('dnsTableContainer'), document.getElementById('rawDNS'), document.getElementById('uptimeStatus')];
  elements.forEach(el => el.style.display = (el.style.display==='none'?'block':'none'));
}

function refreshData(){
  const domain = getDomain();
  if(!domain){ alert("❌ Enter a domain to refresh data."); return; }
  fetchWhois(); fetchDNS(); fetchRDAP(); checkUptime();
}

function hideDNSOutputs(){ document.getElementById('dnsTableContainer').classList.add('hidden'); document.getElementById('rawDNS').classList.add('hidden'); }
function clearUptimeStatus(){ document.getElementById('uptimeStatus').textContent=""; }
</script>

</body>
</html>
