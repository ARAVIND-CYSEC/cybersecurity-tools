<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Enhanced CVE Tester</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' };</script>

<style>
body { transition: 0.5s; }
html.dark body { transition: 0.5s; }
.card { transition: transform 0.2s; }
.card:hover { transform: translateY(-4px); }
.nav-btn { padding: 0.5rem 1rem; border-radius: 0.5rem; background: transparent; color: inherit; font-weight: 500; transition: 0.3s; }
.nav-btn:hover { background-color: rgba(79, 70, 229, 0.2); }
</style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 flex flex-col">

<!-- Navbar -->
<nav class="fixed top-0 left-0 right-0 backdrop-blur-md bg-white/90 dark:bg-gray-900/90 shadow-md z-50 flex justify-between items-center px-6 py-3 border-b border-gray-200 dark:border-gray-700">
  <!-- Brand -->
  <span class="font-bold text-lg text-gray-900 dark:text-gray-100 relative">
    CyberShield
    <span class="absolute -top-1 -right-3 w-6 h-6 bg-indigo-500 opacity-20 rounded-full blur-xl animate-pulse dark:bg-indigo-400"></span>
  </span>

  <!-- Links & Theme Toggle -->
  <div class="flex items-center gap-3">
    <button onclick="window.location.href='home2.html'" class="nav-btn">Home</button>
    <button onclick="window.location.href='tool1.html'" class="nav-btn">Sec Tools</button>
    <button onclick="window.location.href='tool2.html'" class="nav-btn">Threats</button>
    <button onclick="window.location.href='tool3.html'" class="nav-btn">WHOIS</button>
    
    <button id="themeToggle" class="p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-700 transition">
      <svg id="iconMoon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="w-5 h-5 block dark:hidden">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
      </svg>
      <svg id="iconSun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="w-5 h-5 hidden dark:block">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m8.66-9h-1M4.34 12h-1m15.364 5.364l-.707-.707M6.343 6.343l-.707-.707m12.728 12.728l-.707-.707M6.343 17.657l-.707-.707M12 7a5 5 0 100 10 5 5 0 000-10z" />
      </svg>
    </button>
  </div>
</nav>

<main class="flex-grow pt-28 px-4 max-w-4xl mx-auto">

  <h1 class="text-4xl font-extrabold mb-6 text-center text-indigo-600 dark:text-indigo-400">CVE Tester</h1>
  <p class="text-center text-gray-700 dark:text-gray-300 mb-8">Search for software vulnerabilities based on CVE data.</p>

  <!-- CVE Input -->
  <div class="flex flex-col md:flex-row gap-4 mb-6 items-center">
    <input id="softwareInput" type="text" placeholder="Enter software name" class="w-full md:w-2/3 p-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100" />
    <select id="severityFilter" class="w-full md:w-1/6 p-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100">
      <option value="">All Severities</option>
      <option value="LOW">Low</option>
      <option value="MEDIUM">Medium</option>
      <option value="HIGH">High</option>
      <option value="CRITICAL">Critical</option>
    </select>
    <button onclick="searchVulnerabilities()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg w-full md:w-1/6 transition">Search</button>
  </div>

  <!-- CVE Results -->
  <div id="results" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>

</main>

<script>
// Theme toggle
const themeToggle = document.getElementById("themeToggle");
themeToggle.addEventListener("click", () => {
  document.documentElement.classList.toggle("dark");
  localStorage.theme = document.documentElement.classList.contains("dark") ? "dark" : "light";
});
if(localStorage.theme==="dark") document.documentElement.classList.add("dark");

// CVE Search
async function searchVulnerabilities(){
  const input = document.getElementById("softwareInput").value.trim();
  const severity = document.getElementById("severityFilter").value;
  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = '';
  if(!input){ resultsDiv.innerHTML = '<p class="col-span-full text-center text-red-600">Enter software name.</p>'; return; }

  resultsDiv.innerHTML = '<p class="col-span-full text-center">Searching CVEs...</p>';

  try {
    const response = await fetch(`https://services.nvd.nist.gov/rest/json/cves/2.0?keywordSearch=${encodeURIComponent(input)}`);
    const data = await response.json();
    const vulns = data.vulnerabilities || [];
    let filtered = vulns;

    if(severity){
      filtered = vulns.filter(v => v.cve.metrics?.cvssMetricV3?.[0]?.cvssData?.baseSeverity?.toUpperCase() === severity);
    }

    if(filtered.length === 0){ resultsDiv.innerHTML = '<p class="col-span-full text-center">No vulnerabilities found.</p>'; return; }

    resultsDiv.innerHTML = '';
    filtered.forEach(item => {
      const cve = item.cve;
      const id = cve.id;
      const desc = (cve.descriptions && cve.descriptions[0] && cve.descriptions[0].value) ? cve.descriptions[0].value : 'No description';
      const severityLabel = cve.metrics?.cvssMetricV3?.[0]?.cvssData?.baseSeverity || 'N/A';
      const color = severityColor(severityLabel);

      const card = document.createElement('div');
      card.className = `card p-4 bg-white dark:bg-gray-800 rounded-lg shadow-md flex flex-col justify-between`;
      card.innerHTML = `
        <p class="font-bold text-indigo-500 dark:text-indigo-400">${id}</p>
        <p class="text-gray-700 dark:text-gray-200 text-sm mt-1">${desc}</p>
        <p class="mt-2 font-semibold ${color}">Severity: ${severityLabel}</p>
        <a href="https://nvd.nist.gov/vuln/detail/${id}" target="_blank" class="text-blue-600 hover:underline mt-2 text-sm">View on NVD</a>
      `;
      resultsDiv.appendChild(card);
    });

  } catch(e){
    resultsDiv.innerHTML = `<p class="col-span-full text-center text-red-600">Error fetching CVEs: ${e.message}</p>`;
  }
}

function severityColor(sev){
  switch(sev.toUpperCase()){
    case 'LOW': return 'text-green-600';
    case 'MEDIUM': return 'text-yellow-500';
    case 'HIGH': return 'text-orange-600';
    case 'CRITICAL': return 'text-red-600';
    default: return 'text-gray-500';
  }
}
</script>
</body>
</html>
